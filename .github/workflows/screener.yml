name: Yahoo Finance Crypto Screener

on:
  schedule:
    # รันทุก 4 ชั่วโมง เริ่มต้นที่นาทีที่ 20 ของชั่วโมงสากล
    - cron: '20 */4 * * *'
  workflow_dispatch: # สำหรับกดปุ่มคลิกรันเทสด้วยตัวเองได้

# 🟢 จุดเพิ่มที่ 1: ประกาศขอสิทธิ์ Write ให้ตัว Workflow เพื่อให้สคริปต์สั่ง Push สเตทกลับได้
permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2
      with:
        # 🟢 จุดเพิ่มที่ 2: สั่งให้จดจำโทเคนสิทธิ์ไว้เพื่อให้สคริปต์ Python ใช้ตอนทำ git push
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # ตรวจสอบให้มั่นใจว่าใน requirements.txt ของคุณมีครบ (pandas, pandas-ta, yfinance, requests)
        pip install -r requirements.txt

    - name: Execute Screener Script
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python screener.py
